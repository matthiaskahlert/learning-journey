<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learning Journey — Navigation</title>
  <style>
    body {
      margin: 0;
      display: flex;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #0f1724;
      color: #e6eef8;
    }

    nav {
      width: 300px;
      padding: 16px;
      border-right: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto;
    }

    nav h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #60a5fa;
    }

    .tree {
      list-style: none;
      padding-left: 0;
    }

    .tree li {
      margin: 4px 0;
    }

    .tree a {
      color: #93c5fd;
      text-decoration: none;
      padding: 4px 8px;
      display: block;
      border-radius: 4px;
      font-size: 14px;
    }

    .tree a:hover {
      background: rgba(147, 197, 253, 0.1);
    }

    .folder {
      color: #fbbf24;
      font-weight: 500;
      margin-top: 8px;
    }

    main {
      flex: 1;
      padding: 24px;
      overflow: auto;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: white;
    }

    .md-content {
      line-height: 1.6;
      max-width: 900px;
    }

    .info {
      color: #94a3b8;
      font-size: 14px;
    }

    .loading {
      color: #60a5fa;
    }

    .error {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
      padding: 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <nav>
    <h1>Learning Journey</h1>
    <div id="status" class="loading">Lade Struktur...</div>
    <ul class="tree" id="navTree"></ul>
  </nav>

  <main>
    <div id="content" class="info">
      <h2>Willkommen</h2>
      <p>Wähle eine Datei aus der Navigation.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const OWNER = "matthiaskahlert";
    const REPO = "learning-journey";
    const BRANCH = "main";

    const navTree = document.getElementById("navTree");
    const content = document.getElementById("content");
    const statusEl = document.getElementById("status");

    // GitHub Tree API - ALLE Dateien in einem Request!
    async function fetchAllFiles() {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`API Fehler: ${resp.status}`);
      return resp.json();
    }

    // Baue Baum-Struktur aus flacher Liste
    function buildTree(items) {
      const tree = {};
      
      items
        .filter(item => item.path.match(/\.(html|md)$/i))
        .forEach(item => {
          const parts = item.path.split('/');
          let current = tree;
          
          parts.forEach((part, idx) => {
            if (idx === parts.length - 1) {
              // Datei
              if (!current._files) current._files = [];
              current._files.push({ name: part, path: item.path });
            } else {
              // Ordner
              if (!current[part]) current[part] = {};
              current = current[part];
            }
          });
        });
      
      return tree;
    }

    // Rendere Navigation rekursiv
    function renderTree(tree, container, level = 0) {
      Object.keys(tree).sort().forEach(key => {
        if (key === '_files') {
          tree[key].forEach(file => {
            const li = document.createElement('li');
            li.style.paddingLeft = `${level * 16}px`;
            
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = file.name;
            a.onclick = (e) => {
              e.preventDefault();
              loadFile(file.path);
            };
            
            li.appendChild(a);
            container.appendChild(li);
          });
        } else {
          const li = document.createElement('li');
          li.style.paddingLeft = `${level * 16}px`;
          li.className = 'folder';
          li.textContent = `📁 ${key}`;
          container.appendChild(li);
          
          renderTree(tree[key], container, level + 1);
        }
      });
    }

    // Lade Datei
    async function loadFile(path) {
      const ext = path.split('.').pop().toLowerCase();
      
      if (ext === 'html') {
        // Für GitHub Pages (wenn aktiviert):
        const pagesUrl = `https://${OWNER}.github.io/${REPO}/${path}`;
        
        // Alternative: htmlpreview.github.io
        const previewUrl = `https://htmlpreview.github.io/?https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${path}`;
        
        content.innerHTML = `
          <div class="info">
            <h3>${path}</h3>
            <p><strong>GitHub Pages URL (funktioniert nur wenn aktiviert):</strong></p>
            <p><a href="${pagesUrl}" target="_blank" style="color: #60a5fa">${pagesUrl}</a></p>
            
            <p style="margin-top: 20px"><strong>HTML Preview (funktioniert immer):</strong></p>
            <p><a href="${previewUrl}" target="_blank" style="color: #60a5fa">In neuem Tab öffnen</a></p>
            
            <iframe src="${previewUrl}"></iframe>
          </div>
        `;
      } else if (ext === 'md') {
        try {
          const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
          const resp = await fetch(rawUrl);
          const text = await resp.text();
          content.innerHTML = `<div class="md-content">${marked.parse(text)}</div>`;
        } catch (e) {
          content.innerHTML = `<div class="error">Fehler: ${e.message}</div>`;
        }
      }
    }

    // Initialisierung
    async function init() {
      try {
        const data = await fetchAllFiles();
        const tree = buildTree(data.tree);
        
        renderTree(tree, navTree);
        statusEl.textContent = `${data.tree.length} Dateien geladen`;
        
      } catch (e) {
        statusEl.innerHTML = `<div class="error">Fehler: ${e.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
